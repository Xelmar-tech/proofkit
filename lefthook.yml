pre-commit:
  parallel: true
  jobs:
    - name: format
      glob: "*.{ts,tsx,mts,cts,js,jsx,mjs,cjs,json,jsonc,md,yml,yaml}"
      run: pnpm exec oxfmt --write {staged_files}
      stage_fixed: true

    - name: lint
      glob: "*.{ts,tsx,mts,cts,js,jsx,mjs,cjs}"
      run: pnpm exec oxlint {staged_files}

pre-push:
  parallel: false
  fail_fast: true
  jobs:
    - name: check-types
      run: pnpm turbo check-types

    - name: check
      run: pnpm check
