name: Deploy Docs

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/fumadocs/**"
      - "packages/**"
      - "docs/**"
      - ".github/workflows/docs-deploy.yml"
      - "package.json"
      - "pnpm-lock.yaml"

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    environment:
      name: docs
      url: https://proofkit-docs.pages.dev
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter fumadocs build
      - name: Prepare Cloudflare Pages artifact
        run: |
          test -f apps/fumadocs/.output/public/index.html || cp apps/fumadocs/.output/public/_shell.html apps/fumadocs/.output/public/index.html
      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/fumadocs/.output/public --project-name=proofkit-docs
